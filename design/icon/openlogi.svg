<?xml version="1.0" encoding="UTF-8"?>
<!--
  OpenLogi app icon — master design source.

  Follows Apple's 2025/2026 unified app-icon system (macOS Tahoe / Liquid
  Glass / Icon Composer): a single 1024×1024 canvas, a full-bleed
  rounded-rectangle ("squircle") enclosure, and separable background /
  foreground layers. The motif is an ORIGINAL top-view mouse silhouette —
  not Logitech's logo or any trademarked mark.

  Two delivery paths:
   • Direct → .icns (cargo-bundle): rasterize this file as-is. The squircle
     + opaque fill are baked in, so macOS shows it natively at every size.
   • Icon Composer (.icon, native Liquid Glass): drop the full 1024 canvas
     in and let the tool apply the system shape + glass. Use the
     `#foreground` group as the foreground layer and a full-bleed rect with
     the `#bg` gradient (replacing the squircle) as the background layer.

  Brand accent: #3B82F6 (matches the app's theme::ACCENT_BLUE).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024"
     viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: lighter blue at top → deep brand blue at bottom. -->
    <linearGradient id="bg" x1="512" y1="0" x2="512" y2="1024"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5C9DFF"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <!-- Soft top sheen for a subtle Liquid-Glass light-from-above feel. -->
    <linearGradient id="sheen" x1="512" y1="40" x2="512" y2="600"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Mouse body: white with a faint cool tint toward the base. -->
    <linearGradient id="body" x1="512" y1="230" x2="512" y2="824"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#E2ECFF"/>
    </linearGradient>
    <!-- Scroll wheel: light top → deep blue, for a rolled-metal feel. -->
    <linearGradient id="wheelg" x1="512" y1="266" x2="512" y2="362"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B9DFF"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

