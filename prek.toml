# Configuration file for `prek`, a fast Git hook manager written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

# Built-in hooks run natively in Rust — no repo clone, no Python venv, works offline.
[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-merge-conflict" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "devenv shell cargo fmt --all --"
language = "system"
types = ["rust"]
pass_filenames = false

# Clippy compiles the workspace, so keep it on pre-push rather than every commit.
[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "devenv shell cargo clippy --workspace --all-targets -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false
stages = ["pre-push"]
